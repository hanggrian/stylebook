AWSTemplateFormatVersion: "2010-09-09"
# E1004
Description: "42"
Parameters:
  # E2001
  MyName:
    Type: String
    Default: my-valid-bucket-name-123
  # W2001
  UsedParam:
    Type: String
    Default: used-value
  InstanceTypeParam:
    Type: String
  PasswordParam:
    Type: String
    NoEcho: true
Conditions:
  # W8001
  # W8003
  IsProduction: !Equals [!Ref AWS::Region, us-east-1]
  # E8001
  IsUsEast1: !Equals [!Ref AWS::Region, us-east-1]
  # E8003
  IsNotUsEast:
    !Not [!Equals [!Ref AWS::Region, us-east-1]]
  # E8006
  IsUsEastOrWest:
    !Or
    - !Equals [!Ref AWS::Region, us-east-1]
    - !Equals [!Ref AWS::Region, us-west-2]
  # E8004
  IsUsEastAndProd:
    !And
    - !Equals [!Ref AWS::Region, us-east-1]
    - !Equals [!Ref AWS::Region, us-east-1]
  # E8005
  IsNotUsEast2:
    !Not [!Equals [!Ref AWS::Region, us-west-2]]
Mappings:
  # W7001
  UsedMap:
    key:
      Name: value
Resources:
  # E1161
  # E3031
  # E3024
  # E3045
  MyS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      Tags:
      - Key: Name
        Value: my-bucket
      - Key: Env
        Value: prod
      # W3045
      BucketName: !Ref MyName
      OwnershipControls:
        Rules:
        - ObjectOwnership: BucketOwnerEnforced
  # E3673
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Condition: IsUsEastOrWest
    Properties:
      InstanceType: !Ref InstanceTypeParam
      ImageId: ami-12345678
      SecurityGroupIds:
      - !Ref MySecurityGroup
  # E2533
  # E3663
  MyLambdaFunction:
    Type: AWS::Lambda::Function
    Condition: IsUsEast1
    Properties:
      Code:
        ZipFile: |
          def handler(event, context):
              return {}
      Runtime: python3.14
      Handler: index.handler
      Role: !GetAtt MyLambdaRole.Arn
      Environment:
        Variables:
          MY_VAR: value
  MyLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - !Sub
        - arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - {}
  # E3014
  # E3687
  # E3688
  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: My security group
      SecurityGroupIngress:
      - IpProtocol: "-1"
        CidrIp: 0.0.0.0/0
      - IpProtocol: tcp
        FromPort: 443
        ToPort: 443
        CidrIp: 0.0.0.0/0
      - IpProtocol: tcp
        FromPort: -1
        ToPort: -1
        CidrIp: 0.0.0.0/0
  # E1151
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
  # E1154
  MySubnet:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.0.1.0/24
      VpcId: !Ref MyVPC
  MyRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: IsNotUsEast
    Properties:
      VpcId: !Ref MyVPC
  # W3010
  MyVolume:
    Type: AWS::EC2::Volume
    Condition: IsProduction
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      Size: 100
      VolumeType: io1
  # E3035
  # E3036
  # E3638
  # E3039
  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
      BillingMode: PAY_PER_REQUEST
  # E3660
  MyRestApi:
    Type: AWS::ApiGateway::RestApi
    Condition: IsUsEastAndProd
    Properties:
      Name: my-rest-api
      EndpointConfiguration:
        Types:
        - REGIONAL
  # E3601
  MyStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      DefinitionString:
        Fn::Sub:
        - |-
          {
            "Comment": "A Hello World example ${Password}",
            "StartAt": "Hello",
            "States": {
              "Hello": {
                "Type": "Pass",
                "End": true
              }
            }
          }
        - Password: !Ref PasswordParam
      RoleArn: !GetAtt MyLambdaRole.Arn
      Tags:
      - Key: Name
        Value: !Ref UsedParam
      - Key: MapKey
        Value: !FindInMap [UsedMap, key, Name]
  # E3029
  MyRoute53RecordSet:
    Type: AWS::Route53::RecordSet
    Condition: IsNotUsEast2
    Properties:
      AliasTarget:
        DNSName: alias.example.com
        HostedZoneId: Z2FDTNDATAQYW2
      Type: A
      Name: example.com.
      HostedZoneName: example.com.
Outputs:
  # E6001
  MyOutput:
    Value: !Ref MyS3Bucket
  # W6001
  MyImportOutput:
    Value: some-export
