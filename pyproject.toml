[tool.uv.workspace]
members = [
  "stylebook",
]

[tool.uv.sources]
stylebook = { workspace = true }

[tool.poe.tasks]
lint1 = "pylint stylebook/**/*.py"
lint2 = "stylebook ."
lint.parallel = ["lint1", "lint2"]
doc1 = "rm -rf build/pdoc/"
doc2 = "pdoc -o build/pdoc/ stylebook/"
doc = ["doc1", "doc2"]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pdoc",
  # lint
  "rulebook-pylint",
  "regex",
  "pylint==4.0.4",
  "astroid==4.0.2",
  # test
  "pytest",
  "pytest-cov",
]
