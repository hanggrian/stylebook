[tool.uv.workspace]
members = [
  "stylebook",
]

[tool.uv.sources]
stylebook = { workspace = true }

[tool.poe.tasks]
gen-json-lang = "generate_jsonlint_languages.py"
lint1 = "uv run pylint stylebook/**/*.py"
lint2 = "stylebook ."
lint.parallel = ["lint1", "lint2"]
documentation1 = "rm -rf build/pdoc/"
documentation2 = "pdoc -o build/pdoc/ stylebook/"
documentation = ["documentation1", "documentation2"]

[dependency-groups]
dev = [
  "colorama",
  "PyYAML",
  "poethepoet",
  "pdoc",
  # lint
  "rulebook-pylint==0.2",
  "pylint==4.0.4",
  "astroid==4.0.2",
  "regex>=2025.11.3",
  # test
  "pytest",
  "pytest-cov",
]
