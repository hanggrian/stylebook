[tool.uv.workspace]
members = [
  "stylebook",
]

[tool.uv.sources]
stylebook = { workspace = true }

[tool.poe.tasks]
lint1 = { cmd = "pylint **/*.py --rcfile=../.pylintrc", cwd = "stylebook" }
lint2 = "pylint *.py"
lint3 = "stylebook/build/stylebook sample/"
lint4 = "stylebook ."
lint.parallel = ["lint1", "lint2", "lint3", "lint4"]
documentation1 = "rm -rf build/pdoc/"
documentation2 = "pdoc -o build/pdoc/ stylebook/"
documentation = ["documentation1", "documentation2"]

[tool.poe.tasks.build-cpp]
shell = "mkdir -p stylebook/build/ && cd stylebook/build/ && cmake .. -G Ninja && cmake --build ."

[tool.poe.tasks.publish-website]
shell = "pnpm documentation && poe documentation && rm -rf website/docs/api/ && mkdir -p website/docs/api/ && mv build/pdoc/ website/docs/api/pydoc/ && mv build/typedoc/ website/docs/api/tsdoc/ && uv pip install -r website/requirements.txt && cd website/ && mkdocs gh-deploy && rm -rf website/docs/api/"

[tool.poe.tasks.preview-website]
shell = "uv pip install -r website/requirements.txt && cd website/ && mkdocs serve --livereload"

[dependency-groups]
dev = [
  "PyYAML",
  "poethepoet",
  "pdoc",
  # lint
  "rulebook-pylint==0.2",
  "pylint==4.0.4",
  "astroid==4.0.2",
  "regex>=2025.11.3",
  # test
  "pytest",
  "pytest-cov",
]
