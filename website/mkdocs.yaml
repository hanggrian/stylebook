# yamllint enable

theme:
  name: material
  custom_dir: overrides
  favicon: images/favicon.ico
  logo: images/icon.svg
  palette:
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: purple
    accent: amber
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: deep purple
    accent: amber
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  icon:
    repo: material/github
  features:
  - navigation.tabs
  - navigation.sections
  - navigation.expand
  - navigation.top
  - search.suggest
  - search.share
  - content.code.copy
  - content.tabs.link

# yamllint disable rule:line-length
nav:
- Home: index.md
- Rules:
  - General: rules/index.md
  - CSS rules: rules/css.md
  - Dockerfile rules: rules/dockerfile.md
  - HTML rules: rules/html.md
  - JSON rules: rules/json.md
  - Markdown rules: rules/markdown.md
  - SQL rules: rules/sql.md
  - TOML rules: rules/toml.md
  - YAML rules: rules/yaml.md
  - External links:
    - Blinter rules: https://github.com/tboy1337/Blinter/blob/main/docs/Batch-File-Linter-Requirements.md?ext
    - Checkmake rules: https://github.com/checkmake/checkmake/tree/main/rules/?ext
    - Hadolint rules: https://github.com/hadolint/hadolint#rules?ext
    - HTMLHint rules: https://htmlhint.com/rules/?ext
    - PyINILint rules: https://gitlab.com/danieljrmay/pyinilint/?ext
    - JSON Lint rules: https://www.npmjs.com/package/@prantlf/jsonlint/?ext
    - markdownlint rules: https://github.com/DavidAnson/markdownlint/tree/main/doc/?ext
    - propertieslint rules: https://github.com/hanggrian/propertieslint/?ext
    - protolint rules: https://github.com/yoheimuta/protolint/?ext
    - SQLFluff rules: https://docs.sqlfluff.com/en/stable/reference/rules.html?ext
    - Stylelint rules: https://stylelint.io/user-guide/rules/?ext
    - TFLint rules: https://github.com/terraform-linters/tflint-ruleset-terraform/blob/main/docs/rules/README.md?ext
    - Taplo rules: https://taplo.tamasfe.dev/configuration/formatter-options.html?ext
    - yamllint rules: https://yamllint.readthedocs.io/en/stable/rules.html?ext
- GoDoc: api/godoc
- Pydoc: api/pydoc
- TSDoc: api/tsdoc
# yamllint enable

plugins:
- search

extra_javascript:
- scripts/mermaid.min.js  # hotfix for Mermaid not loading in GitHub Pages
extra_css:
- styles/colors.css
- styles/icons.css
- styles/links.css
- https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined

hooks:
- hooks/archive.py

validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    absolute_links: warn
    unrecognized_links: warn

# extra:
#   analytics:
#     provider: google
#     property: !ENV GOOGLE_ANALYTICS_KEY

markdown_extensions:
- toc:
    permalink: true
- admonition
- pymdownx.details
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.mark
- pymdownx.smartsymbols
- attr_list
- md_in_html
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.tasklist:
    custom_checkbox: true
- footnotes
