extends: default

rules:
  document-start: disable
  empty-lines:
    max: 1
  empty-values: enable
  indentation:
    spaces: 2
    indent-sequences: whatever
  float-values: enable
  octal-values: enable
  quoted-strings:
    allow-quoted-quotes: true
    quote-type: double
    required: false
  truthy:
    check-keys: false
