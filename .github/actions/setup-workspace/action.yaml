name: Setup Workspace
description: Checkout and install all dependencies

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: "3.14"

    - uses: pnpm/action-setup@v6

    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
        cache: pnpm

    - uses: actions/cache@v5
      with:
        path: .venv/
        key: uv-${{ hashFiles('uv.lock') }}
        restore-keys: uv-

    - uses: actions/cache@v5
      with:
        path: |
          .pnpm-store/
          node_modules/
        key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: pnpm-

    - shell: bash
      run: pnpm i
